<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mystic Grimoire</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&family=Cinzel:wght@500;700&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #0a0a12, #05050a);
}


.navbar {
    background: rgba(10, 10, 18, 0.88);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(212, 175, 55, 0.25);
    padding: 18px 0;
}


.logo {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #e8e8e8;
    text-align: center;
    position: relative;
}


.logo span {
    color: #d4af37;
}


.logo::after {
    content: "";
    display: block;
    width: 60%;
    height: 2px;
    margin: 6px auto 0;
    background: linear-gradient(to right, transparent, #d4af37, transparent);
    opacity: 0.8;
}


.logo:hover {
    text-shadow: 0 0 14px rgba(212, 175, 55, 0.4);
    transition: 0.3s ease;
}


@media (max-width: 576px) {
    .logo {
        font-size: 22px;
        letter-spacing: 2px;
    }
}
</style>
</head>

<body>

<nav class="navbar">
    <div class="container d-flex justify-content-center">
        <div class="logo">Mystic <span>Grimoire</span></div>
    </div>
</nav>

</body>
</html>
