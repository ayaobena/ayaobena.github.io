<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystic Grimoire - Characters</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&family=Cinzel:wght@500;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <nav class="navbar">
        <div class="container d-flex justify-content-center">
            <div class="logo">Mystic <span>Grimoire</span></div>
        </div>
    </nav>

    <div class="container">
        <div class="row" id="contents">
            <div class="loading text-center w-100 mt-5">
                <p>Summoning characters...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
        </script>

    <script>
        const getCharacters = async () => {
            const res = await fetch('https://potterapi-fedeperin.vercel.app/en/characters');
            const characterData = await res.json();

            const contents = document.getElementById('contents');
            contents.innerHTML = '';
            characterData.forEach(character => {
                const name = character.fullName || "Unknown Wizard";
                const house = character.hogwartsHouse || "No House";
                const nickname = character.nickname ? ` ("${character.nickname}")` : "";
                const imageUrl = character.image;

                const imageHtml = imageUrl
                    ? `<img src="${imageUrl}" alt="${name}">`
                    : `<div class="no-image">No Photo</div>`;

                contents.innerHTML += `
                    <div class="col-12 col-md-6 col-lg-4 my-3">
                        <div class="card my-4 p-4 text-center rounded-4 h-100">
                            <div class="mx-auto card-img-top-container">
                                ${imageHtml}
                            </div>
                            <div class="h4 mt-4">${name}${nickname}</div>
                            <div class="text-warning">${house}</div>
                        </div>
                    </div>`;
            });
        };

        getCharacters();
    </script>
</body>

</html>
